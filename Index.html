<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flash Employees</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
html{
  zoom:1.50;
  -webkit-text-size-adjust:115%;
}
:root{
  --neon:#00ff88;
  --bg:#020b02;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--neon);
  min-height:100vh;
  overflow:hidden;
  padding:15px;
  font-family:'Share Tech Mono',monospace;
}

canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
  repeating-linear-gradient(
    transparent 0px,
    rgba(0,255,120,.05) 2px,
    transparent 4px
  );
  animation:scan 6s linear infinite;
  z-index:1;
  pointer-events:none;
}

@keyframes scan{
  0%{
    transform:translateY(-100%);
  }
  100%{
    transform:translateY(100%);
  }
}

.container{
  position:relative;
  z-index:5;
  max-width:1700px;
  margin:auto;
}

.header{
  background:rgba(0,0,0,.75);
  border:1px solid rgba(0,255,120,.25);
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
  backdrop-filter:blur(5px);
  box-shadow:
  0 0 25px rgba(0,255,120,.12),
  inset 0 0 15px rgba(0,255,120,.05);
}

.title{
  font-size:38px;
  letter-spacing:4px;
  font-family:'Orbitron',sans-serif;
  text-transform:uppercase;
  color:var(--neon);
  position:relative;
  cursor:pointer;

  text-shadow:
  0 0 8px var(--neon),
  0 0 18px var(--neon),
  0 0 30px var(--neon);

  animation:glitch 1s infinite;
}

.title::before,
.title::after{
  content:attr(data-text);
  position:absolute;
  top:0;
  left:0;
}

.title::before{
  color:red;
  z-index:-1;
  animation:glitchTop .6s infinite;
}

.title::after{
  color:blue;
  z-index:-2;
  animation:glitchBottom .6s infinite;
}

@keyframes glitch{
  0%,100%{
    transform:none;
  }
  20%{
    transform:translateX(-2px);
  }
  40%{
    transform:translateX(2px);
  }
  60%{
    transform:skew(-1deg);
  }
}

@keyframes glitchTop{
  50%{
    transform:translate(-2px,-2px);
  }
}

@keyframes glitchBottom{
  50%{
    transform:translate(2px,2px);
  }
}

.terminal{
  margin-top:12px;
  font-size:13px;
  line-height:1.6;
  color:#77ffc4;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.upload-btn,
button,
input{
  background:#000;
  color:var(--neon);
  border:1px solid rgba(0,255,120,.25);
  border-radius:8px;
  padding:12px 16px;
  outline:none;
  transition:.2s;
  font-size:14px;
  font-family:'Share Tech Mono',monospace;
  box-shadow:
  0 0 10px rgba(0,255,120,.08);
}

.upload-btn{
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
}

button{
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
}

button:hover,
.upload-btn:hover{
  background:var(--neon);
  color:#000;
  box-shadow:
  0 0 20px var(--neon);
}

input{
  min-width:260px;
}

input::placeholder{
  color:#00aa66;
}

input:focus{
  box-shadow:
  0 0 20px rgba(0,255,120,.35);
}

.info{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:12px;
  background:rgba(0,255,120,.03);
  border:1px solid rgba(0,255,120,.08);
  border-radius:10px;
  padding:12px;
}

.table-container{
  background:rgba(0,0,0,.72);
  border:1px solid rgba(0,255,120,.15);
  border-radius:12px;
  overflow:auto;
  max-height:73vh;
  box-shadow:
  0 0 25px rgba(0,255,120,.08);
}

.table-container::-webkit-scrollbar{
  width:8px;
  height:8px;
}

.table-container::-webkit-scrollbar-thumb{
  background:#00ff88;
  border-radius:10px;
}

.table-container::-webkit-scrollbar-track{
  background:#001100;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

thead{
  position:sticky;
  top:0;
  z-index:5;
  background:#001600;
}

th{
  padding:15px;
  text-align:left;
  text-transform:uppercase;
  letter-spacing:2px;
  font-size:13px;
  border-bottom:1px solid rgba(0,255,120,.08);
}

td{
  padding:14px;
  font-size:13px;
  border-bottom:1px solid rgba(0,255,120,.05);
  color:#aaffd4;
}

tbody tr{
  transition:.12s;
}

tbody tr:hover{
  background:rgba(0,255,120,.05);
}

.highlight{
  background:#ff0044;
  color:#fff;
  padding:2px 4px;
  border-radius:4px;
}

.empty{
  text-align:center;
  padding:80px;
  font-size:18px;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup.active{
  display:flex;
}

.popup-box{
  width:420px;
  background:#041104;
  border:1px solid rgba(0,255,120,.25);
  border-radius:12px;
  padding:25px;
  box-shadow:
  0 0 30px rgba(0,255,120,.18);
  animation:popupShow .18s ease;
}

@keyframes popupShow{

  from{
    opacity:0;
    transform:scale(.92);
  }

  to{
    opacity:1;
    transform:scale(1);
  }

}

.popup-box h2{
  font-family:'Orbitron',sans-serif;
  margin-bottom:20px;
}

.popup-fields{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.popup-buttons button{
  flex:1;
}

.history-list{
  max-height:55vh;
  overflow:auto;
  border:1px solid rgba(0,255,120,.08);
  border-radius:10px;
}

.history-item{
  padding:14px;
  border-bottom:1px solid rgba(0,255,120,.06);
  cursor:pointer;
  transition:.12s;
}

.history-item:hover{
  background:rgba(0,255,120,.05);
}

.history-item:active{
  transform:scale(.98);
}

.history-name{
  color:var(--neon);
}

.history-time{
  margin-top:5px;
  font-size:12px;
  color:#66cc99;
}

.history-empty{
  padding:30px;
  text-align:center;
}

@media(max-width:768px){

  .title{
    font-size:24px;
    letter-spacing:2px;
  }

  .topbar{
    flex-direction:column;
  }

  input,
  button,
  .upload-btn{
    width:100%;
  }

  td,
  th{
    font-size:11px;
    padding:10px;
  }

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="header">

<h1 class="title" id="title" data-text="Welcome Dear">
Welcome Dear
</h1> 

<div class="terminal" id="terminal">
> SYSTEM ONLINE<br>
> CYBER LINK ACTIVE<br>
> WAITING FOR DATABASE...
</div>

<div class="topbar">

<label class="upload-btn" id="uploadLabel">
CHOOSE FILE
<input type="file" id="excelFile" accept=".xlsx,.xls,.csv" hidden>
</label>

<input type="text" id="searchInput" placeholder="SEARCH DATABASE...">

<button id="filterBtn">
ADV FILTER
</button>

<button id="syncBtn">
SYNC
</button>

<button id="clearBtn">
CLEAR
</button>

</div>

</div>

<div class="info">

<span id="infoText">
READY...
</span>

<span id="resultCount">
0 RECORDS
</span>

</div>

<div class="table-container">

<table id="excelTable">

<thead></thead>

<tbody>

<tr>
<td class="empty">
NO DATABASE CONNECTED
</td>
</tr>

</tbody>

</table>

</div>

</div>

<div class="popup" id="filterPopup">

<div class="popup-box">

<h2>ADVANCED FILTER</h2>

<div class="popup-fields">

<input type="text" id="f1" placeholder="Filter 1">

<input type="text" id="f2" placeholder="Filter 2">

<input type="text" id="f3" placeholder="Filter 3">

</div>

<div class="popup-buttons">

<button id="applyFilter">
APPLY
</button>

<button id="closeFilter">
CLOSE
</button>

</div>

</div>

</div>

<div class="popup" id="historyPopup">

<div class="popup-box">

<h2>DATABASE</h2>

<div class="history-list" id="historyList">

<div class="history-empty">
NO HISTORY FOUND
</div>

</div>

<div class="popup-buttons">

<button id="closeHistory">
CLOSE
</button>

</div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCWXc27Cmhtz_fMKf2H5w2buAYOZExRP84",
  authDomain: "real-time-chat-d041d.firebaseapp.com",
  databaseURL: "https://real-time-chat-d041d-default-rtdb.firebaseio.com",
  projectId: "real-time-chat-d041d",
  storageBucket: "real-time-chat-d041d.appspot.com",
  messagingSenderId: "353320921316",
  appId: "1:353320921316:web:51511054448f4fc8d624f1",
  measurementId: "G-0NGLX7FDRT"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

}

resizeCanvas();

window.addEventListener(
'resize',
resizeCanvas
);

const chars =
"01アカサタナハマヤャラワガザダバパ0123456789";

const fontSize = 15;

let columns =
canvas.width / fontSize;

let drops = [];

for(let i=0;i<columns;i++){

  drops[i] =
  Math.random() *
  canvas.height /
  fontSize;

}

function draw(){

  ctx.fillStyle =
  "rgba(2,11,2,0.08)";

  ctx.fillRect(
  0,
  0,
  canvas.width,
  canvas.height
  );

  ctx.fillStyle =
  "#00ff88";

  ctx.font =
  fontSize +
  "px monospace";

  for(let i=0;i<drops.length;i++){

    const text =
    chars[
    Math.floor(
    Math.random() *
    chars.length
    )];

    ctx.fillText(
    text,
    i * fontSize,
    drops[i] * fontSize
    );

    if(
    drops[i] *
    fontSize >
    canvas.height &&
    Math.random() > .975
    ){

      drops[i] = 0;

    }

    drops[i]++;

  }

  setTimeout(()=>{

    requestAnimationFrame(draw);

  },35);

}

draw();

let originalData = [];
let currentData = [];
let currentRawData = [];
let headers = [];
let currentFileName = '';

const fileInput =
document.getElementById(
'excelFile'
);

const searchInput =
document.getElementById(
'searchInput'
);

const table =
document.getElementById(
'excelTable'
);

const thead =
table.querySelector(
'thead'
);

const tbody =
table.querySelector(
'tbody'
);

const infoText =
document.getElementById(
'infoText'
);

const resultCount =
document.getElementById(
'resultCount'
);

const terminal =
document.getElementById(
'terminal'
);

const filterPopup =
document.getElementById(
'filterPopup'
);

const historyPopup =
document.getElementById(
'historyPopup'
);

const historyList =
document.getElementById(
'historyList'
);

const uploadLabel =
document.getElementById(
'uploadLabel'
);

fileInput.addEventListener(
'change',
handleFile
);

searchInput.addEventListener(
'input',
debounce(applyAllFilters,80)
);

document
.getElementById(
'filterBtn'
)
.onclick =
()=>{

filterPopup.classList.add(
'active'
);

};

document
.getElementById(
'closeFilter'
)
.onclick =
()=>{

filterPopup.classList.remove(
'active'
);

};

document
.getElementById(
'applyFilter'
)
.onclick =
()=>{

  applyAllFilters();

  filterPopup.classList.remove(
    'active'
  );

  log(
    'MULTI FILTER ACTIVE'
  );

};

document
.getElementById(
'clearBtn'
)
.onclick =
clearAll;

document
.getElementById(
'syncBtn'
)
.onclick =
syncData;

document
.getElementById(
'title'
)
.onclick =
()=>{

historyPopup.classList.add(
'active'
);

loadHistory();

};

document
.getElementById(
'closeHistory'
)
.onclick =
()=>{

historyPopup.classList.remove(
'active'
);

};

function log(msg){

terminal.innerHTML +=
`<br>> ${msg}`;

}

function debounce(fn,delay){

let timer;

return (...args)=>{

clearTimeout(timer);

timer =
setTimeout(
()=>fn(...args),
delay
);

};

}

function handleFile(e){

const file =
e.target.files[0];

if(!file) return;

currentFileName =
file.name;

infoText.innerHTML =
'LOADING DATABASE...';

log(
'SCANNING FILE'
);

const reader =
new FileReader();

reader.onload =
function(event){

try{

const data =
new Uint8Array(
event.target.result
);

const workbook =
XLSX.read(
data,
{type:'array'}
);

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

const jsonData =
XLSX.utils.sheet_to_json(
sheet,
{defval:''}
);

if(!jsonData.length){

tbody.innerHTML =
`
<tr>
<td class="empty">
EMPTY DATABASE
</td>
</tr>
`;

return;

}

originalData =
jsonData;

currentData =
[...jsonData];

currentRawData =
[...jsonData];

headers =
Object.keys(
jsonData[0]
);

renderTable(
currentData,
false
);

uploadLabel.style.display =
'none';

infoText.innerHTML =
'DATABASE CONNECTED';

log(
jsonData.length +
' RECORDS LOADED'
);

}

catch(err){

console.error(err);

infoText.innerHTML =
'ERROR';

}

};

reader.readAsArrayBuffer(file);

}

function renderTable(
data,
highlight=false
){

if(!data.length){

tbody.innerHTML =
`
<tr>
<td class="empty">
NO DATA FOUND
</td>
</tr>
`;

resultCount.innerHTML =
'0 RECORDS';

return;

}

thead.innerHTML =
`
<tr>
${headers.map(h=>
`<th>${h}</th>`
).join('')}
</tr>
`;

const search =
searchInput.value
.trim()
.toLowerCase();

const terms =
search
?
search.split(/\s+/)
:
[];

const fragment =
document.createDocumentFragment();

for(let i=0;i<data.length;i++){

  const tr =
  document.createElement('tr');

  for(let j=0;j<headers.length;j++){

    const td =
    document.createElement('td');

    const cell =
    String(
      data[i][headers[j]] ?? ''
    );

    if(highlight && terms.length){

      let value = cell;

      for(let k=0;k<terms.length;k++){

        value =
        value.replace(
          new RegExp(
            terms[k],
            'gi'
          ),
          m=>
          `<span class="highlight">${m}</span>`
        );

      }

      td.innerHTML = value;

    }

    else{

      td.textContent = cell;

    }

    tr.appendChild(td);

  }

  fragment.appendChild(tr);

}

tbody.innerHTML = '';

tbody.appendChild(fragment);

resultCount.innerHTML =
data.length +
' RECORDS';

}

function applyAllFilters(){

  const searchTerms =
  searchInput.value
  .trim()
  .toLowerCase()
  .split(/\s+/)
  .filter(Boolean);

  const advFilters = [

    document
    .getElementById('f1')
    .value
    .trim()
    .toLowerCase(),

    document
    .getElementById('f2')
    .value
    .trim()
    .toLowerCase(),

    document
    .getElementById('f3')
    .value
    .trim()
    .toLowerCase()

  ].filter(Boolean);

  currentData =
  originalData.filter(row=>{

    const rowText =
    headers.map(h=>
      String(row[h] || '')
      .toLowerCase()
    ).join(' ');

    const searchMatch =
    searchTerms.every(term=>
      rowText.includes(term)
    );

    const advMatch =
    advFilters.every(filter=>
      rowText.includes(filter)
    );

    return searchMatch && advMatch;

  });

  renderTable(
    currentData,
    searchTerms.length > 0
  );

  resultCount.innerHTML =
  currentData.length +
  ' RECORDS';

}

function clearAll(){

searchInput.value = '';

document.getElementById(
'f1'
).value = '';

document.getElementById(
'f2'
).value = '';

document.getElementById(
'f3'
).value = '';

filterPopup.classList.remove(
'active'
);

historyPopup.classList.remove(
'active'
);

originalData = [];
currentData = [];
currentRawData = [];
headers = [];
currentFileName = '';

thead.innerHTML = '';

tbody.innerHTML =
`
<tr>
<td class="empty">
NO DATABASE CONNECTED
</td>
</tr>
`;

uploadLabel.style.display =
'inline-flex';

infoText.innerHTML =
'READY...';

resultCount.innerHTML =
'0 RECORDS';

log(
'SYSTEM RESET'
);

}

async function syncData(){

if(!currentRawData.length){

alert(
'NO DATA'
);

return;

}

try{

const id =
Date.now();

await db
.ref(
'neuralgrid/history/' + id
)
.set({

fileName:
currentFileName,

uploadedAt:
new Date()
.toLocaleString(),

headers,

rows:
currentRawData

});

infoText.innerHTML =
'SYNC SUCCESS';

log(
'DATABASE SYNC COMPLETE'
);
alert("sync done");
}

catch(err){

console.error(err);

infoText.innerHTML =
'SYNC FAILED';

}

}

async function loadHistory(){

historyList.innerHTML =
`
<div class="history-empty">
LOADING...
</div>
`;

try{

const snapshot =
await db
.ref(
'neuralgrid/history'
)
.once('value');

const data =
snapshot.val();

if(!data){

historyList.innerHTML =
`
<div class="history-empty">
NO HISTORY FOUND
</div>
`;

return;

}

const entries =
Object.entries(data)
.reverse();

historyList.innerHTML = '';

entries.forEach(
([id,item])=>{

const div =
document.createElement(
'div'
);

div.className =
'history-item';

div.innerHTML =
`
<div class="history-name">
${item.fileName}
</div>

<div class="history-time">
${item.uploadedAt}
</div>
`;

div.onclick =
()=>{

openHistoryFile(item);

};

historyList.appendChild(div);

});

}

catch(err){

console.error(err);

}

}

function openHistoryFile(item){

headers =
item.headers || [];

originalData =
item.rows || [];

currentData =
[...originalData];

currentRawData =
[...originalData];

currentFileName =
item.fileName;

renderTable(
currentData,
false
);

uploadLabel.style.display =
'none';

historyPopup.classList.remove(
'active'
);

infoText.innerHTML =
item.fileName;

log(
'HISTORY FILE OPENED'
);

}

window.addEventListener(
'click',
e=>{

  if(
    e.target === filterPopup
  ){

    filterPopup.classList.remove(
      'active'
    );

  }

  if(
    e.target === historyPopup
  ){

    historyPopup.classList.remove(
      'active'
    );

  }

});

document.addEventListener(
'keydown',
e=>{

if(
(e.ctrlKey ||
e.metaKey)
&&
e.key === 'k'
){

e.preventDefault();

searchInput.focus();

}

});

</script>

</body>
</html>
